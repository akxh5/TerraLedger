spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/terraledger}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

blockchain:
  rpc:
    url: ${BLOCKCHAIN_RPC_URL:http://localhost:8545}
  contract:
    address: ${CONTRACT_ADDRESS:0x5FbDB2315678afecb367f032d93F642f64180aa3}
  abi:
    path: ${BLOCKCHAIN_ABI_PATH:smart-contract/artifacts/contracts/TerraLedger.sol/TerraLedger.json}
